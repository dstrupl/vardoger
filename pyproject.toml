[project]
name = "vardoger"
version = "0.1.0"
description = "Personalize AI coding assistants by analyzing conversation history"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0.0",
]

[project.scripts]
vardoger = "vardoger.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vardoger"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
